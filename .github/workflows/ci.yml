name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Run GolangCI-Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --config=.golangci.yml

  test:
    needs: lint

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Run Tests
        run: go test ./... -v

  build:
    needs: [lint, test]

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build (Linux AMD64)
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/preflight-linux-amd64 -v .
