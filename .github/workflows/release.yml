name: Release

on:
  push:
    tags:
      - '*'

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm >= 11.5.1
        run: npm install -g npm@latest && npm --version

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest release provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip

      - name: Generate npm packages
        run: node npm/generate.mjs "${{ github.ref_name }}"

      - name: Determine npm dist-tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          tag="latest"
          if [ "$version" != "${version%%-*}" ]; then
            pre="${version#*-}"
            tag="${pre%%.*}"
          fi
          echo "NPM_DIST_TAG=$tag" >> "$GITHUB_ENV"
          echo "Publishing $version to npm dist-tag: $tag"

      - name: Publish to npm
        run: |
          version="${GITHUB_REF_NAME#v}"

          publish_with_retry() {
            local name="$1" dir="$2" attempt
            for attempt in 1 2 3; do
              if [ -n "$(npm view "$name@$version" version 2>/dev/null || true)" ]; then
                echo "$name@$version already published, skipping"
                return 0
              fi
              if npm publish --provenance --tag "$NPM_DIST_TAG" "$dir"; then
                return 0
              fi
              echo "publish of $name failed (attempt $attempt), retrying in 20s"
              sleep 20
            done
            echo "publish of $name failed after 3 attempts"
            return 1
          }

          for dir in npm/dist/preflight-*; do
            publish_with_retry "@jacobjoergensen/$(basename "$dir")" "$dir"
          done

          publish_with_retry "@jacobjoergensen/preflight" npm/dist/preflight
