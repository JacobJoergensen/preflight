name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm >= 11.5.1
        run: npm install -g npm@latest && npm --version

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest release provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip

      - name: Generate npm packages
        run: node npm/generate.mjs "${{ github.ref_name }}"

      - name: Publish platform packages
        run: |
          version="${GITHUB_REF_NAME#v}"
          for dir in npm/dist/preflight-*; do
            name="@jacobjoergensen/$(basename "$dir")"
            if [ -n "$(npm view "$name@$version" version 2>/dev/null || true)" ]; then
              echo "$name@$version already published, skipping"
            else
              npm publish --provenance "$dir"
            fi
          done

      - name: Publish main package
        run: |
          version="${GITHUB_REF_NAME#v}"
          name="@jacobjoergensen/preflight"
          if [ -n "$(npm view "$name@$version" version 2>/dev/null || true)" ]; then
            echo "$name@$version already published, skipping"
          else
            npm publish --provenance npm/dist/preflight
          fi
