version: 2

project_name: preflight

before:
  hooks:
    - go mod tidy

builds:
  - binary: preflight
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/JacobJoergensen/preflight/internal/release.Version={{.Version}} -X github.com/JacobJoergensen/preflight/internal/release.Commit={{.ShortCommit}} -X github.com/JacobJoergensen/preflight/internal/release.Date={{.Date}}

archives:
  - ids:
      - preflight
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

npms:
  - name: "@jacobjoergensen/preflight"
    description: "CLI tool that validates project dependencies before you run into problems"
    homepage: https://github.com/JacobJoergensen/preflight
    keywords:
      - cli
      - devtools
      - dependencies
      - security
      - audit
      - preflight
    license: MIT
    author: JacobJoergensen
    repository: git+https://github.com/JacobJoergensen/preflight.git
    bugs: https://github.com/JacobJoergensen/preflight/issues
    access: public

release:
  github:
    owner: JacobJoergensen
    name: preflight
  prerelease: auto
  draft: false
