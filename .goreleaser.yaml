version: 2

project_name: preflight

before:
  hooks:
    - go mod tidy

builds:
  - id: preflight
    binary: preflight
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/JacobJoergensen/preflight/cmd.Version={{.Version}}

archives:
  - builds:
      - preflight
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

chocolateys:
  - name: preflight
    owners: JacobJoergensen
    authors: JacobJoergensen
    title: PreFlight
    project_url: https://github.com/JacobJoergensen/preflight
    license_url: https://github.com/JacobJoergensen/preflight/blob/main/LICENSE
    bug_tracker_url: https://github.com/JacobJoergensen/preflight/issues
    summary: CLI tool that validates project dependencies before you run into problems
    description: |
      PreFlight checks if everything is installed, fixes what's missing, and runs security audits across package managers.
      Supports JavaScript, PHP, Go, Python, and Ruby ecosystems.
    tags: "cli devtools dependencies security audit"
    skip_publish: true
    api_key: "{{ .Env.CHOCOLATEY_API_KEY }}"

npms:
  - name: preflight-cli
    description: "CLI tool that validates project dependencies before you run into problems"
    homepage: https://github.com/JacobJoergensen/preflight
    keywords:
      - cli
      - devtools
      - dependencies
      - security
      - audit
      - preflight
    license: MIT
    author: JacobJoergensen
    repository: https://github.com/JacobJoergensen/preflight
    bugs: https://github.com/JacobJoergensen/preflight/issues
    access: public

winget:
  - name: preflight
    publisher: JacobJoergensen
    short_description: "CLI tool that validates project dependencies before you run into problems"
    license: "mit"
    publisher_url: https://github.com/JacobJoergensen
    publisher_support_url: https://github.com/JacobJoergensen/preflight/issues
    package_identifier: JacobJoergensen.preflight
    homepage: https://github.com/JacobJoergensen/preflight
    description: "Checks if everything is installed, fixes what's missing, and runs security audits across package managers. Supports JavaScript, PHP, Go, Python, and Ruby ecosystems."
    tags:
      - cli
      - devtools
      - dependencies
      - security
      - audit
    skip_upload: true
    repository:
      owner: JacobJoergensen
      name: winget-pkgs
      branch: main

release:
  github:
    owner: JacobJoergensen
    name: preflight
  prerelease: auto
  draft: false
